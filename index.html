<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarMatch Pro 條碼比對器 (晴兒總監離線版 v0.1)</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --text-light: #e0e0e0;
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden; /* 防止捲動影響掃描框 */
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 基準條碼卡片區 (固定在上方) */
        #base-card {
            background-color: var(--card-dark);
            padding: 15px;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #base-info {
            display: flex;
            flex-direction: column;
        }

        #base-label {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 4px;
        }

        #base-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            word-break: break-all;
        }

        #reset-btn {
            background-color: var(--bg-dark);
            color: var(--text-light);
            border: 1px solid #444;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        #reset-btn:active {
            opacity: 0.8;
        }

        /* 掃描區域 (下方全部) */
        #scanner-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #reader {
            width: 100%;
            height: 100%;
            border: none !important; /* 移除庫自帶的邊框 */
        }

        /* 強制庫自帶的掃描框變成我們想要的樣式 */
        #reader__scan_region {
            border: none !important;
        }
        
        #reader__dashboard {
            display: none !important; /* 隱藏自帶按鈕 */
        }

        /* 視覺防呆覆蓋層 */
        #status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5); /* 初始透明灰色 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s ease;
            pointer-events: none; /* 讓點擊穿透 */
            z-index: 10;
        }

        #status-icon {
            font-size: 100px;
            margin-bottom: 20px;
        }

        #status-text {
            font-size: 24px;
            font-weight: bold;
        }

        /* 下方操作按鈕 (當設定完基準後出現) */
        #action-container {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* 狀態樣式：吻合 OK */
        .status-ok #status-overlay {
            background-color: rgba(46, 204, 113, 0.7); /* 半透明綠 */
        }
        .status-ok #status-icon { color: white; }
        .status-ok #status-text { color: white; }

        /* 狀態樣式：不吻合 NG */
        .status-ng #status-overlay {
            background-color: rgba(231, 76, 60, 0.7); /* 半透明紅 */
        }
        .status-ng #status-icon { color: white; }
        .status-ng #status-text { color: white; }

        /* 隱藏元素 */
        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>

<div id="app">
    <div id="base-card">
        <div id="base-info">
            <span id="base-label">基準料號 (Target):</span>
            <span id="base-value">尚未設定 (請掃描)</span>
        </div>
        <button id="reset-btn" class="hidden" onclick="resetApp()">重新設定</button>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        
        <div id="status-overlay">
            <div id="status-icon">🔍</div>
            <div id="status-text">請先掃描「基準條碼」貼紙</div>
        </div>
    </div>

    <div id="action-container" class="hidden">
        <button id="compare-btn" class="action-btn" onclick="startComparing()">開始交叉比對</button>
        <button id="next-btn" class="action-btn hidden" onclick="prepareForNextCompare()">已確認 (比對下一個)</button>
    </div>
</div>

<script>
    // 儲存基準代碼
    let baseBarcode = null;
    let html5QrCode = null;
    let isComparing = false; // 是否進入比對模式

    // 初始化掃描器
    function initScanner() {
        // 'reader' 是 HTML 中 div 的 ID
        html5QrCode = new Html5Qrcode("reader");
        
        // 開始掃描設定：後置鏡頭，FPS 15，掃描框 300x150
        const config = { fps: 15, qrbox: { width: 300, height: 150 } };
        
        html5QrCode.start(
            { facingMode: "environment" }, // 呼叫後置主鏡頭
            config,
            onScanSuccess // 掃描成功回呼函數
        ).catch((err) => {
            console.error("掃描器啟動失敗:", err);
            alert("無法啟動相機。請確認已授權相機權限，且是在 HTTPS 環境下開啟。");
        });
    }

    // 當條碼被成功解析時
    function onScanSuccess(decodedText, decodedResult) {
        console.log(`讀取到: ${decodedText}`);

        const appDiv = document.getElementById('app');
        const overlayIcon = document.getElementById('status-icon');
        const overlayText = document.getElementById('status-text');

        // 如果還沒有設定基準，這就是基準條碼
        if (!baseBarcode) {
            baseBarcode = decodedText;
            
            // 更新 UI
            document.getElementById('base-value').innerText = `[${decodedResult.result.format.formatName}] ${baseBarcode}`;
            document.getElementById('reset-btn').classList.remove('hidden');
            document.getElementById('action-container').classList.remove('hidden');
            
            overlayIcon.innerText = "⭕";
            overlayText.innerText = "基準設定成功！料號一致。";
            
            // 強制設定為綠色狀態 0.5 秒，然後關閉相機
            appDiv.className = "status-ok";
            setTimeout(() => {
                appDiv.className = "";
                overlayIcon.innerText = "✅";
                overlayText.innerText = "準備就緒，點擊下方按鈕開始交叉比對。";
                html5QrCode.stop().then(() => {
                    console.log("基準設定完成，相機關閉。");
                });
            }, 800);
        
        } else if (isComparing) {
            // 如果是在比對模式下讀取到第二個條碼
            
            // 執行最極致的字串嚴格比對
            if (decodedText === baseBarcode) {
                // ✅ 比對吻合 OK
                appDiv.className = "status-ok";
                overlayIcon.innerText = "⭕";
                overlayText.innerText = "OK！料號一致。";
                
                // 進入「等待確認」狀態
                prepareForNextState(true);
            
            } else {
                // ❌ 比對不符 NG
                appDiv.className = "status-ng";
                overlayIcon.innerText = "❌";
                overlayText.innerText = `NG！料號不符。(${decodedText})`;
                
                // 進入「等待確認」狀態
                prepareForNextState(false);
            }
        }
    }

    // 點擊「開始交叉比對」按鈕
    function startComparing() {
        isComparing = true;
        document.getElementById('compare-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden'); // 先把確認鈕也隱藏
        document.getElementById('app').className = ""; // 清除任何狀態色
        
        document.getElementById('status-icon').innerText = "🔍";
        document.getElementById('status-text').innerText = "請掃描「標籤上的 QR Code」進行比對";
        
        // 重新開啟相機，這次用更大的框，方便掃二維碼
        const config = { fps: 15, qrbox: { width: 300, height: 300 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess).then(() => {
            console.log("交叉比對相機開啟。");
        });
    }

    // 處理比對後的狀態（是吻合還是不吻合）
    function prepareForNextState(isMatch) {
        isComparing = false; // 暫時關閉比對觸發，防止重複掃描
        
        // 關閉相機以幫你省電，並讓你看清楚結果畫面
        html5QrCode.stop().then(() => {
            console.log("比對完成，相機關閉。");
            document.getElementById('next-btn').classList.remove('hidden');
            
            if (isMatch) {
                document.getElementById('next-btn').innerText = "已確認 (繼續比對下一個)";
            } else {
                document.getElementById('next-btn').innerText = "已確認 (重新比對)";
            }
        });
    }

    // 點擊「已確認」按鈕，重置畫面，準備下一次掃描
    function prepareForNextCompare() {
        document.getElementById('app').className = ""; // 恢復黑色
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('compare-btn').classList.remove('hidden'); // 恢復「開始交叉比對」按鈕
        
        document.getElementById('status-icon').innerText = "✅";
        document.getElementById('status-text').innerText = "準備就緒，點擊下方按鈕開始交叉比對。";
    }

    // 重新設定所有基準 (重新從 Phase 1 開始)
    function resetApp() {
        baseBarcode = null;
        isComparing = false;
        
        document.getElementById('app').className = "";
        document.getElementById('base-value').innerText = "尚未設定 (請掃描)";
        document.getElementById('reset-btn').classList.add('hidden');
        document.getElementById('action-container').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('compare-btn').classList.remove('hidden');
        
        document.getElementById('status-icon').innerText = "🔍";
        document.getElementById('status-text').innerText = "請先掃描「基準條碼」貼紙";
        
        // 如果相機還開著，先關掉
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                initScanner(); // 重新初始化掃描器
            });
        } else {
            initScanner();
        }
    }

    // 網頁加載時自動開啟相機 (Phase 1)
    window.addEventListener('load', () => {
        initScanner();
    });

</script>

</body>
</html>
