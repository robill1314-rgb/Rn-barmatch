<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarMatch Pro 條碼比對器 (v0.2 iOS修復版)</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --text-light: #e0e0e0;
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-dark); color: var(--text-light);
            overflow: hidden;
        }
        #app { display: flex; flex-direction: column; height: 100vh; }
        #base-card {
            background-color: var(--card-dark); padding: 15px; margin: 10px;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: space-between;
        }
        #base-info { display: flex; flex-direction: column; }
        #base-label { font-size: 14px; color: #aaaaaa; margin-bottom: 4px; }
        #base-value { font-size: 20px; font-weight: bold; color: var(--primary); word-break: break-all; }
        #reset-btn {
            background-color: var(--bg-dark); color: var(--text-light);
            border: 1px solid #444; padding: 10px 18px; border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        #scanner-container {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        #reader { width: 100%; height: 100%; border: none !important; }
        #reader__scan_region { border: none !important; }
        #reader__dashboard { display: none !important; }
        
        #status-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: background-color 0.2s ease;
            z-index: 10;
        }
        #status-icon { font-size: 80px; margin-bottom: 20px; }
        #status-text { font-size: 20px; font-weight: bold; text-align: center; padding: 0 20px; }
        
        /* v0.2 新增：手動啟動按鈕 */
        #init-btn {
            margin-top: 30px; background-color: var(--primary); color: white;
            border: none; padding: 15px 40px; border-radius: 30px;
            font-size: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.5);
            cursor: pointer; pointer-events: auto; /* 確保按鈕可以被點擊 */
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #action-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 20; }
        .action-btn {
            background-color: var(--primary); color: white; border: none; padding: 18px 35px;
            border-radius: 35px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.4); cursor: pointer;
        }
        
        .status-ok #status-overlay { background-color: rgba(46, 204, 113, 0.85); }
        .status-ng #status-overlay { background-color: rgba(231, 76, 60, 0.85); }
        .hidden { display: none !important; }
        .pointer-none { pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="base-card">
        <div id="base-info">
            <span id="base-label">基準料號 (Target):</span>
            <span id="base-value">尚未設定</span>
        </div>
        <button id="reset-btn" class="hidden" onclick="resetApp()">重新設定</button>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="status-overlay">
            <div id="status-icon">📸</div>
            <div id="status-text">準備就緒，請點擊下方按鈕啟動相機</div>
            <button id="init-btn" onclick="firstTimeInit()">👉 點此開啟相機 👈</button>
        </div>
    </div>

    <div id="action-container" class="hidden">
        <button id="compare-btn" class="action-btn" onclick="startComparing()">開始交叉比對</button>
        <button id="next-btn" class="action-btn hidden" onclick="prepareForNextCompare()">已確認 (比對下一個)</button>
    </div>
</div>

<script>
    let baseBarcode = null;
    let html5QrCode = null;
    let isComparing = false; 

    // v0.2 新增：使用者主動點擊觸發 (破解 iOS 限制)
    function firstTimeInit() {
        document.getElementById('init-btn').classList.add('hidden');
        document.getElementById('status-icon').innerText = "🔍";
        document.getElementById('status-text').innerText = "請先掃描「基準條碼」貼紙";
        document.getElementById('status-overlay').classList.add('pointer-none'); // 讓掃描框可以透視
        initScanner();
    }

    function initScanner() {
        if(!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch((err) => {
            console.error(err);
            alert("相機啟動失敗！請確認 iOS 設定中 Safari 的相機權限已開啟。");
            document.getElementById('init-btn').classList.remove('hidden');
            document.getElementById('status-overlay').classList.remove('pointer-none');
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        // 防止重複觸發
        if(html5QrCode.isPaused) return; 

        const appDiv = document.getElementById('app');
        const overlay = document.getElementById('status-overlay');
        const overlayIcon = document.getElementById('status-icon');
        const overlayText = document.getElementById('status-text');

        if (!baseBarcode) {
            baseBarcode = decodedText;
            document.getElementById('base-value').innerText = `${baseBarcode}`;
            document.getElementById('reset-btn').classList.remove('hidden');
            document.getElementById('action-container').classList.remove('hidden');
            
            overlay.classList.remove('pointer-none');
            appDiv.className = "status-ok";
            overlayIcon.innerText = "⭕";
            overlayText.innerText = "基準設定成功！";
            
            html5QrCode.pause(); // 暫停相機省電
            
            setTimeout(() => {
                appDiv.className = "";
                overlayIcon.innerText = "✅";
                overlayText.innerText = "請點擊下方按鈕開始交叉比對";
            }, 1000);
        
        } else if (isComparing) {
            html5QrCode.pause(); // 掃到就先暫停，避免畫面狂閃
            overlay.classList.remove('pointer-none');
            
            if (decodedText === baseBarcode) {
                appDiv.className = "status-ok";
                overlayIcon.innerText = "⭕";
                overlayText.innerText = "OK！料號一致。";
                prepareForNextState(true);
            } else {
                appDiv.className = "status-ng";
                overlayIcon.innerText = "❌";
                overlayText.innerText = `NG！料號不符\n(${decodedText})`;
                prepareForNextState(false);
            }
        }
    }

    function startComparing() {
        isComparing = true;
        document.getElementById('compare-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('app').className = ""; 
        
        const overlay = document.getElementById('status-overlay');
        overlay.classList.add('pointer-none'); // 畫面變透明
        document.getElementById('status-icon').innerText = "";
        document.getElementById('status-text').innerText = "";
        
        if(html5QrCode.getState() === 2) { // 如果是 paused 狀態
            html5QrCode.resume();
        } else {
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        }
    }

    function prepareForNextState(isMatch) {
        isComparing = false; 
        document.getElementById('next-btn').classList.remove('hidden');
        if (isMatch) {
            document.getElementById('next-btn').innerText = "✅ 已確認 (繼續下一個)";
        } else {
            document.getElementById('next-btn').innerText = "⚠️ 已確認 (重新比對)";
        }
    }

    function prepareForNextCompare() {
        document.getElementById('app').className = ""; 
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('compare-btn').classList.remove('hidden'); 
        
        document.getElementById('status-icon').innerText = "✅";
        document.getElementById('status-text').innerText = "請點擊下方按鈕開始交叉比對";
    }

    function resetApp() {
        baseBarcode = null;
        isComparing = false;
        
        document.getElementById('app').className = "";
        document.getElementById('base-value').innerText = "尚未設定";
        document.getElementById('reset-btn').classList.add('hidden');
        document.getElementById('action-container').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('compare-btn').classList.remove('hidden');
        
        document.getElementById('status-overlay').classList.remove('pointer-none');
        document.getElementById('status-icon').innerText = "🔍";
        document.getElementById('status-text').innerText = "請先掃描「基準條碼」貼紙";
        
        if(html5QrCode && html5QrCode.getState() === 2) {
            html5QrCode.resume();
        }
    }
</script>
</body>
</html>
